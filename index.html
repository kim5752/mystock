<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERP 엑셀 연동 및 커스텀 재고 관리 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f9f9f9; color: #333; }
        
        /* 전체 화면 폭을 조절 */
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 25px; }
        
        /* 상단 기능 구역 구성을 반반으로 정렬 */
        .top-grids { display: flex; gap: 20px; margin-bottom: 10px; }
        .excel-zone { flex: 1; background-color: #e8f4fd; padding: 15px; border: 2px dashed #2196F3; border-radius: 6px; text-align: center; }
        .add-zone { flex: 1; background-color: #f0f4f8; padding: 15px; border: 1px solid #cfd8dc; border-radius: 6px; }
        
        .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .add-form input { padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .add-form .full-width { grid-column: span 2; }
        
        /* 표 스타일: 콤팩트하고 아담한 스타일 유지 */
        table { 
            width: auto;            
            margin: 15px auto 0 auto; 
            border-collapse: collapse; 
            font-size: 14px;        
        }
        
        th, td { 
            border: 1px solid #ddd; 
            padding: 8px 12px;      
            text-align: left; 
            white-space: nowrap;    
        }
        
        th { background-color: #f2f2f2; font-weight: bold; text-align: center; }
        
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        
        .alert-row { background-color: #ffeedd; color: red; font-weight: bold; }
        .btn { padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-add { background-color: #008CBA; color: white; grid-column: span 2; padding: 8px; margin-top: 5px; }
        .btn-in { background-color: #4CAF50; color: white; }
        .btn-out { background-color: #f44336; color: white; }
        .btn-del { background-color: #bbb; color: white; }
        
        .qty-input { width: 40px; padding: 3px; text-align: center; font-size: 13px; }
        .safety-input { width: 50px; padding: 3px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; margin-bottom: 25px;">📊 ERP 엑셀 연동 및 수동 재고 관리 시스템</h1>
    
    <div class="section top-grids">
        <div class="excel-zone">
            <h3 style="margin-top: 5px;">📥 ERP 일일 재고표(엑셀) 넣기</h3>
            <p style="color: #666; font-size: 12px; margin-bottom: 5px;">기존 목록에 엑셀 데이터를 덮어씌웁니다.</p>
            <input type="file" id="excel-file" accept=".xlsx, .xls" onchange="readExcel(event)">
        </div>
        
        <div class="add-zone">
            <h3 style="margin-top: 5px;">🆕 수동 신규 상품 등록</h3>
            <div class="add-form">
                <input type="text" id="new-code" placeholder="코드 (예: O196625)">
                <input type="text" id="new-name" placeholder="품명 (예: OP9662R)">
                <input type="text" id="new-spec" placeholder="규격 (예: PCI S/A)">
                <input type="text" id="new-unit" placeholder="단위 (예: EA)" value="EA">
                <input type="number" id="new-stock" placeholder="현재 재고량 (숫자)" value="0">
                <input type="number" id="new-safety" placeholder="안전재고 기준 (숫자)" value="0">
                <button class="btn btn-add" onclick="addProduct()">➕ 리스트에 상품 추가하기</button>
            </div>
        </div>
    </div>

    <div class="section" style="overflow-x: auto;">
        <h2 style="text-align: center;">📦 현재 재고 현황 목록</h2>
        <table>
            <thead>
                <tr>
                    <th>코드</th>
                    <th>품명</th>
                    <th>규격</th>
                    <th>단위</th>
                    <th>현재 재고량</th>
                    <th>안전 재고 설정</th>
                    <th>상태</th>
                    <th>수량 조정</th>
                    <th>삭제</th>
                </tr>
            </thead>
            <tbody id="product-list-body">
                <tr>
                    <td colspan="9" style="text-align: center; color: #999; padding: 20px;">데이터가 없습니다. 엑셀을 업로드하거나 신규 상품을 등록해 주세요.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 브라우저 저장소에서 기존 데이터 가져오기
    let products = JSON.parse(localStorage.getItem('myExcelProducts')) || [];

    // 기존 데이터가 있으면 화면에 표시
    if (products.length > 0) {
        updateUI();
    }

    // 1. ERP 엑셀 파일 읽기 기능
    function readExcel(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const excelRows = XLSX.utils.sheet_to_json(worksheet);

            let mappedProducts = excelRows.map((row, index) => {
                return {
                    id: Date.now() + index, // 고유 ID 부여
                    code: row['고 유 코 드'] || row['코 드'] || row['코드'] || '-', 
                    name: row['품 명'] || row['품명'] || '이름 없음', 
                    spec: row['규 격'] || row['규격'] || '-',       
                    unit: row['단위'] || 'EA',      
                    stock: parseInt(row['재고량'] || 0), 
                    safety: parseInt(row['안전재고'] || 0) 
                };
            });

            // 불필요한 총계 행 필터링
            products = mappedProducts.filter(p => p.name !== '총계' && p.name !== '이름 없음');

            saveAndRefresh();
            alert(`총 ${products.length}개의 품목을 ERP 엑셀에서 성공적으로 동기화했습니다!`);
        };
        reader.readAsArrayBuffer(file);
    }

    // 2. 화면에서 직접 신규 상품 추가 기능
    function addProduct() {
        const code = document.getElementById('new-code').value.trim() || '-';
        const name = document.getElementById('new-name').value.trim();
        const spec = document.getElementById('new-spec').value.trim() || '-';
        const unit = document.getElementById('new-unit').value.trim() || 'EA';
        const stock = parseInt(document.getElementById('new-stock').value) || 0;
        const safety = parseInt(document.getElementById('new-safety').value) || 0;

        if (!name) {
            alert("품명은 필수 입력 사항입니다.");
            return;
        }

        const newProduct = {
            id: Date.now(),
            code: code,
            name: name,
            spec: spec,
            unit: unit,
            stock: stock,
            safety: safety
        };

        products.push(newProduct);
        saveAndRefresh();

        // 입력창 리셋 (단위는 기본값 보존)
        document.getElementById('new-code').value = '';
        document.getElementById('new-name').value = '';
        document.getElementById('new-spec').value = '';
        document.getElementById('new-stock').value = '0';
        document.getElementById('new-safety').value = '0';
    }

    // 3. 표 안에서 안전재고를 실시간으로 직접 수정할 때 작동하는 함수
    function updateSafety(id, newSafetyValue) {
        const product = products.find(p => p.id === id);
        if (product) {
            product.safety = parseInt(newSafetyValue) || 0;
            localStorage.setItem('myExcelProducts', JSON.stringify(products));
            
            // 행의 색상과 상태 텍스트만 실시간으로 업데이트하기 위해 새로고침 실행
            updateUI(); 
        }
    }

    // 4. 입출고 수량 변경 기능
    function changeStock(id, type) {
        const inputElement = document.getElementById(`qty-${id}`);
        const amount = parseInt(inputElement.value);

        if (isNaN(amount) || amount <= 0) {
            alert("올바른 수량을 입력해주세요.");
            return;
        }

        const product = products.find(p => p.id === id);
        if (product) {
            if (type === 'IN') product.stock += amount;
            if (type === 'OUT') product.stock -= amount;
            saveAndRefresh();
        }
    }

    // 5. 상품 수동 삭제 기능
    function deleteProduct(id) {
        if (confirm("이 상품을 리스트에서 삭제하시겠습니까?")) {
            products = products.filter(p => p.id !== id);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('myExcelProducts', JSON.stringify(products));
        updateUI();
    }

    // 6. 종합 화면 출력(UI) 함수
    function updateUI() {
        const tbody = document.getElementById('product-list-body');
        tbody.innerHTML = '';

        if (products.length === 0) {
            tbody.innerHTML = `<tr><td colspan="9" style="text-align: center; color: #999; padding: 20px;">데이터가 없습니다.</td></tr>`;
            return;
        }

        products.forEach(product => {
            const isShortage = product.stock < product.safety;
            const rowClass = isShortage ? 'class="alert-row"' : '';
            const statusText = isShortage ? '⚠️ 발주필요' : '정상';

            tbody.innerHTML += `
                <tr ${rowClass}>
                    <td class="text-center">${product.code}</td>
                    <td><strong>${product.name}</strong></td>
                    <td>${product.spec}</td>
                    <td class="text-center">${product.unit}</td>
                    <td class="text-right">${product.stock.toLocaleString()} ${product.unit}</td>
                    
                    <td class="text-center">
                        <input type="number" class="safety-input" value="${product.safety}" onchange="updateSafety(${product.id}, this.value)">
                    </td>
                    
                    <td class="text-center">${statusText}</td>
                    <td class="text-center">
                        <input type="number" id="qty-${product.id}" class="qty-input" value="1" min="1">
                        <button class="btn btn-in" onclick="changeStock(${product.id}, 'IN')">입고</button>
                        <button class="btn btn-out" onclick="changeStock(${product.id}, 'OUT')">출고</button>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-del" onclick="deleteProduct(${product.id})">삭제</button>
                    </td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
